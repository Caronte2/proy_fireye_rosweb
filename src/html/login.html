<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso al Dashboard</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS propio -->
 <link rel="stylesheet" href="../css/logincss.css">
</head>
<body>

  <div class="main-wrapper">
    
    <!-- Logo superior -->
    <div class="top-logo">
      <a href="../index.html">
      <img src="../img/logoFireyeNegro.png" alt="Logo ojo">
      </a>
    </div>

    <!-- Círculo rojo central -->
    <div class="login-circle">
      <div class="login-content">
        <h1 class="login-title">ACCESO AL DASHBOARD</h1>

        <form id="loginForm">
          <div class="mb-4">
            <label for="userId" class="form-label custom-label">ID:</label>
            <input type="text" class="form-control custom-input" id="userId" name="userId">
          </div>

          <div class="mb-4">
            <label for="password" class="form-label custom-label">Contraseña:</label>
            <input type="password" class="form-control custom-input" id="password" name="password">
          </div>

          <div class="text-center mt-4">
            <button type="submit" class="btn custom-btn">INICIAR SESIÓN</button>
          </div>
        </form>
      </div>
    </div>

  </div>
<script src="../js/fakelogin.js"></script>
</body>
</html>
